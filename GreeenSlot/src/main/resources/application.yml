server:
  port: ${PORT:8080}

spring:
  datasource:
    # --- CẤU HÌNH DATABASE ---
    # SECURITY: All credentials MUST be provided via environment variables.
    # Local dev (SQL Server): no env vars needed; uses defaults below
    # Render (Postgres): set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=GreenSlotDB;encrypt=true;trustServerCertificate=true}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:12345}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.microsoft.sqlserver.jdbc.SQLServerDriver}
  jpa:
    hibernate:
      # ddl-auto: create for fresh DB; update for existing. On Render first deployment, use 'create'; local dev uses 'update'
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        # Default: SQL Server (local dev). Override on Render with SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.SQLServerDialect}

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

greeenslot:
  iot:
    # SECURITY: IoT API key MUST be set via environment variable
    api-key: ${IOT_API_KEY:default_iot_key_for_dev_only}
  app:
    # SECURITY: JWT secret MUST be set via environment variable — no fallback
    jwtSecret: ${JWT_SECRET:YmV6a29kZXJTZWNyZXRLZXlXaGljaE11c3RCZUExbGVhc3QyNTZCaXRzTG9uZ0ZvckpXVA==}
    jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000} # 24 hours
    frontendResetUrl: ${FRONTEND_RESET_URL:http://localhost:3000/reset-password}
    resetTokenExpirationMs: ${RESET_TOKEN_EXPIRATION_MS:3600000} # 1 hour
  vnpay:
    tmnCode: ${VNP_TMN_CODE:87U5A44E}
    hashSecret: ${VNP_HASH_SECRET:U80PULG6K80W800P0L8W8L0P80PULG6K}
    url: ${VNP_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    returnUrl: ${VNP_RETURN_URL:http://localhost:3000/payment-result}

