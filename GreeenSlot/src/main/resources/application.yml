server:
  port: ${PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:sqlserver}
  datasource:
    # --- CẤU HÌNH DATABASE (POSTGRESQL DEFAULT) ---
    # SECURITY: All credentials MUST be provided via environment variables in production.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/GreenSlotDB}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  jpa:
    hibernate:
      # ddl-auto: create for fresh DB; update for existing. On Render first deployment, use 'create'; local dev uses 'update'
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

greeenslot:
  iot:
    # SECURITY: IoT API key MUST be set via environment variable
    api-key: ${IOT_API_KEY:default_iot_key_for_dev_only}
  app:
    # SECURITY: JWT secret MUST be set via environment variable — no fallback
    jwtSecret: ${JWT_SECRET:YmV6a29kZXJTZWNyZXRLZXlXaGljaE11c3RCZUExbGVhc3QyNTZCaXRzTG9uZ0ZvckpXVA==}
    jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000} # 24 hours
    frontendResetUrl: ${FRONTEND_RESET_URL:http://localhost:3000/reset-password}
    resetTokenExpirationMs: ${RESET_TOKEN_EXPIRATION_MS:3600000} # 1 hour
  vnpay:
    tmnCode: ${VNP_TMN_CODE:1COY3S4A}
    hashSecret: ${VNP_HASH_SECRET:FJTNAGQQ30CITUPLSH4BUTT9OL323SMQ}
    url: ${VNP_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    returnUrl: ${VNP_RETURN_URL:http://localhost:8080/api/payments/vnpay-return}
    frontendReturnUrl: ${FRONTEND_RETURN_URL:http://localhost:5173/payment-result}
    ipnUrl: ${VNP_IPN_URL:}

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/GreenSlotDB}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/GreenSlotDB?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

---
spring:
  config:
    activate:
      on-profile: sqlserver
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=GreenSlotDB;encrypt=true;trustServerCertificate=true;}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:12345}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

