server:
  port: ${PORT:8080}

spring:
  datasource:
    # --- CẤU HÌNH LOCAL: SQL Server (chạy máy cá nhân) ---
    # Khi deploy lên Render, set các biến môi trường bên dưới để ghi đè sang PostgreSQL
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=GreenSlotDB;encrypt=true;trustServerCertificate=true}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:12345}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.microsoft.sqlserver.jdbc.SQLServerDriver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.SQLServerDialect}

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

greeenslot:
  app:
    jwtSecret: ${JWT_SECRET:======================GreenSlot=Spring=Boot=Secret=Key=For=JWT=Generation=Must=Be=Long======================}
    jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000} # 24 hours
    frontendResetUrl: ${FRONTEND_RESET_URL:http://localhost:3000/reset-password}
    resetTokenExpirationMs: ${RESET_TOKEN_EXPIRATION_MS:3600000} # 1 hour

